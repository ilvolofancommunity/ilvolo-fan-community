name: Update IL VOLO News

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-news: 
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

          - name: Run news updater
        run: |
          python scripts/update-news.py

      - name: Commit updated news
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git commit -m "Update IL VOLO news" || echo "No changes to commit"
          git push
